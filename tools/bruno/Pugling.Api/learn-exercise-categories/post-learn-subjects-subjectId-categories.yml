info:
  name: Erstellt eine Art unter einem Fach.
  type: http
  seq: 2
  tags:
    - Learn – Exercise Categories

http:
  method: POST
  url: "{{baseUrl}}/api/v1/learn/subjects/:subjectId/categories"
  params:
    - name: subjectId
      value: "{{subjectId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "name": "Vokabeln"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('subjectId', body.subjectId ?? body.id);
          capture('categoryId', body.categoryId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Art (Kategorie) anlegen
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 201."
    request:
      url: "{{baseUrl}}/api/v1/learn/subjects/:subjectId/categories"
      method: POST
      params:
        - name: subjectId
          value: "{{subjectId}}"
          type: path
      body:
        type: json
        data: |-
          {
            "name": "Vokabeln"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 8,
            "subjectId": 5,
            "name": "Vokabeln",
            "createdAt": "<timestamp>"
          }
  - name: Doppelte Art anlegen (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 409, Code `conflict`."
    request:
      url: "{{baseUrl}}/api/v1/learn/subjects/:subjectId/categories"
      method: POST
      params:
        - name: subjectId
          value: "{{subjectId}}"
          type: path
      body:
        type: json
        data: |-
          {
            "name": "Vokabeln"
          }
    response:
      status: 409
      statusText: Conflict
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/conflict",
            "title": "Conflict.",
            "status": 409,
            "detail": "This category already exists in the subject.",
            "code": "conflict",
            "traceId": "<trace-id>"
          }

docs: |-
  # Erstellt eine Art unter einem Fach.

  `POST /api/v1/learn/subjects/{subjectId}/categories`
