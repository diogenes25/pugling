info:
  name: "Der Item-Lernstand des Kindes, schwächste zuerst. Filter: exerciseId (nur eine Übung), maxBox (Box ≤ N), onlyWeak (Beherrschung &lt; 50 %). Gesamtzahl im Header `X-Total-Count`."
  type: http
  seq: 1
  tags:
    - Learn – Vocabulary Progress

http:
  method: GET
  url: "{{baseUrl}}/api/v1/children/:childId/vocabulary-progress"
  params:
    - name: childId
      value: "{{childId}}"
      type: path
    - name: exerciseId
      value: "{{exerciseId}}"
      type: query
      disabled: true
    - name: maxBox
      value: ""
      type: query
      disabled: true
    - name: onlyWeak
      value: "false"
      type: query
    - name: skip
      value: "0"
      type: query
    - name: take
      value: "100"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('childId', body.childId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  # Der Item-Lernstand des Kindes, schwächste zuerst. Filter: exerciseId (nur eine Übung), maxBox (Box ≤ N), onlyWeak (Beherrschung &lt; 50 %). Gesamtzahl im Header `X-Total-Count`.

  `GET /api/v1/children/{childId}/vocabulary-progress`
