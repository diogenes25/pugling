info:
  name: Plant eine Klassenarbeit (oder trägt eine bereits geschriebene nach). Nur Vater, nur eigene Kinder.
  type: http
  seq: 2
  tags:
    - Learn – Class Tests

http:
  method: POST
  url: "{{baseUrl}}/api/v1/class-tests"
  body:
    type: json
    data: |-
      {
        "childId": "{{childId}}",
        "title": "Vokabeltest Unit 5",
        "scheduledDate": "2099-03-01"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setVar(name, value);
          bru.setEnvVar(name, String(value), { persist: true });
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('classTestId', body.classTestId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Klassenarbeit planen
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 201."
    request:
      url: "{{baseUrl}}/api/v1/class-tests"
      method: POST
      body:
        type: json
        data: |-
          {
            "childId": 1,
            "title": "Vokabeltest Unit 5",
            "scheduledDate": "2099-03-01"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "klassenarbeit": {
              "id": 3,
              "childId": 1,
              "subjectId": null,
              "subjectName": null,
              "title": "Vokabeltest Unit 5",
              "topic": null,
              "scheduledDate": "2099-03-01",
              "status": "Planned",
              "grade": null,
              "gradeComment": null,
              "directExerciseCount": 0,
              "tags": [],
              "createdAt": "<timestamp>"
            },
            "assignedExercises": []
          }
  - name: Note außerhalb des Bereichs (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 400, Code `validation_error`."
    request:
      url: "{{baseUrl}}/api/v1/class-tests"
      method: POST
      body:
        type: json
        data: |-
          {
            "childId": 1,
            "title": "Ungültige Note",
            "scheduledDate": "2099-03-01",
            "grade": 9
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/validation_error",
            "title": "Invalid request.",
            "status": 400,
            "detail": "Grade must be between 1.0 and 6.0.",
            "code": "validation_error",
            "traceId": "<trace-id>"
          }
  - name: Unbekannte Übung zuweisen (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 400, Code `invalid_reference`."
    request:
      url: "{{baseUrl}}/api/v1/class-tests"
      method: POST
      body:
        type: json
        data: |-
          {
            "childId": 1,
            "title": "Unbekannte Übung",
            "scheduledDate": "2099-03-01",
            "exerciseIds": [
              999999
            ]
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/invalid_reference",
            "title": "Invalid request.",
            "status": 400,
            "detail": "Unknown exercise IDs: 999999",
            "code": "invalid_reference",
            "traceId": "<trace-id>"
          }

docs: |-
  # Plant eine Klassenarbeit (oder trägt eine bereits geschriebene nach). Nur Vater, nur eigene Kinder.

  `POST /api/v1/class-tests`
