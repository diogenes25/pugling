info:
  name: Markiert einen offenen Kauf als real erfüllt (der Vater hat seinen Teil der Abmachung erbracht).
  type: http
  seq: 7
  tags:
    - Admin – Rewards

http:
  method: POST
  url: "{{baseUrl}}/api/v1/children/:childId/rewards/redemptions/:redemptionId/fulfill"
  params:
    - name: childId
      value: "{{childId}}"
      type: path
    - name: redemptionId
      value: "{{redemptionId}}"
      type: path
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('childId', body.childId ?? body.id);
          capture('redemptionId', body.redemptionId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Kauf erfüllen (Vater)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 200."
    request:
      url: "{{baseUrl}}/api/v1/children/:childId/rewards/redemptions/:redemptionId/fulfill"
      method: POST
      params:
        - name: childId
          value: "{{childId}}"
          type: path
        - name: redemptionId
          value: "{{redemptionId}}"
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 1,
            "childId": 4,
            "rewardId": 5,
            "title": "30 Min Fernsehen",
            "cost": 50,
            "status": "Fulfilled",
            "purchasedAt": "2026-07-07T21:03:44.9390357",
            "fulfilledAt": "<timestamp>",
            "canFulfill": false,
            "canCancel": false
          }
  - name: Bereits erfüllten Kauf erneut erfüllen (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 409, Code `purchase_not_open`."
    request:
      url: "{{baseUrl}}/api/v1/children/:childId/rewards/redemptions/:redemptionId/fulfill"
      method: POST
      params:
        - name: childId
          value: "{{childId}}"
          type: path
        - name: redemptionId
          value: "{{redemptionId}}"
          type: path
    response:
      status: 409
      statusText: Conflict
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/purchase_not_open",
            "title": "Purchase not open.",
            "status": 409,
            "detail": "This purchase is no longer open.",
            "code": "purchase_not_open",
            "traceId": "<trace-id>"
          }

docs: |-
  # Markiert einen offenen Kauf als real erfüllt (der Vater hat seinen Teil der Abmachung erbracht).

  `POST /api/v1/children/{childId}/rewards/redemptions/{redemptionId}/fulfill`
