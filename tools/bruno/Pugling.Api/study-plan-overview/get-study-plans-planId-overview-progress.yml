docs: |-
  # Tag-für-Tag-Verlauf über die gesamte Laufzeit (erledigte Tage, erreichte Ziele, Punkte). Die Kennzahlen (`DaysComplete`/`TotalPoints`/`CurrentStreak`) beziehen sich bewusst auf die <b>gesamte</b> Laufzeit; Filter/Sortierung/Paging wirken nur auf `Days`. Die gefilterte Gesamtzahl der Tage steht im Header `X-Total-Count`.

  `GET /api/v1/study-plans/{planId}/overview/progress`
