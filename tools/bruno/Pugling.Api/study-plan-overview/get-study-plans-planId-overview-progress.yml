info:
  name: Tag-für-Tag-Verlauf über die gesamte Laufzeit (erledigte Tage, erreichte Ziele, Punkte). Die Kennzahlen (`DaysComplete`/`TotalPoints`/`CurrentStreak`) beziehen sich bewusst auf die <b>gesamte</b> Laufzeit; Filter/Sortierung/Paging wirken nur auf `Days`. Die gefilterte Gesamtzahl der Tage steht im Header `X-Total-Count`.
  type: http
  seq: 2
  tags:
    - Study – Plan Overview

http:
  method: GET
  url: "{{baseUrl}}/api/v1/study-plans/:planId/overview/progress"
  params:
    - name: planId
      value: "{{planId}}"
      type: path
      description: Lehrplan, dessen Verlauf gelesen wird.
    - name: from
      value: ""
      type: query
      description: Nur Tage ab diesem Datum (inklusive).
      disabled: true
    - name: to
      value: ""
      type: query
      description: Nur Tage bis zu diesem Datum (inklusive).
      disabled: true
    - name: dutyDone
      value: "false"
      type: query
      description: Nur Tage mit erledigter (`true`) bzw. offener (`false`) Pflicht.
      disabled: true
    - name: sort
      value: ""
      type: query
      description: "Sortierung: `day` (Standard), `-day`, `points`, `-points`."
      disabled: true
    - name: skip
      value: "0"
      type: query
      description: Anzahl zu überspringender Tage (Paging).
    - name: take
      value: "100"
      type: query
      description: Maximale Tages-Zahl (1..500). Gesamtzahl im Header `X-Total-Count`.
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('planId', body.planId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

