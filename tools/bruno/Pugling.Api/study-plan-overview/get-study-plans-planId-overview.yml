info:
  name: "Tagesmission: heute fällige Positionen mit Status, erledigte Pflicht und aktuelle Streak."
  type: http
  seq: 1
  tags:
    - Study – Plan Overview

http:
  method: GET
  url: "{{baseUrl}}/api/v1/study-plans/:planId/overview"
  params:
    - name: planId
      value: "{{planId}}"
      type: path
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('planId', body.planId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Tagesmission (Overview)
    description: "Verifiziert durch DocsCaptureTests: Rolle `child`, erwartet HTTP 200."
    request:
      url: "{{baseUrl}}/api/v1/study-plans/:planId/overview"
      method: GET
      params:
        - name: planId
          value: "{{planId}}"
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "planId": 2,
            "title": "Doku-Lehrplan",
            "startDate": "2026-07-07",
            "endDate": "2026-07-16",
            "active": true,
            "currentStreak": 1,
            "today": {
              "day": "2026-07-07",
              "dutyDone": true,
              "goalsTotal": 1,
              "goalsMet": 1,
              "pointsAwarded": 20,
              "outstanding": [],
              "positions": [
                {
                  "positionId": 2,
                  "exerciseId": 13,
                  "exerciseTitle": "Begrüßungen",
                  "exerciseType": "Vocabulary",
                  "renderer": "flashcards",
                  "order": 0,
                  "cadence": "Daily",
                  "checkMode": "StudyPlanTest",
                  "useLeitner": true,
                  "testable": true,
                  "goalMet": true,
                  "dueCount": 1,
                  "poolSize": 2,
                  "pointsGoalMet": 20
                }
              ]
            }
          }

docs: |-
  # Tagesmission: heute fällige Positionen mit Status, erledigte Pflicht und aktuelle Streak.

  `GET /api/v1/study-plans/{planId}/overview`
