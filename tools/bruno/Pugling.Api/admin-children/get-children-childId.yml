info:
  name: Ein einzelnes Kind.
  type: http
  seq: 4
  tags:
    - Admin – Children

http:
  method: GET
  url: "{{baseUrl}}/api/v1/children/:childId"
  params:
    - name: childId
      value: "{{childId}}"
      type: path
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('childId', body.childId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Einzelnes Kind lesen
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 200."
    request:
      url: "{{baseUrl}}/api/v1/children/:childId"
      method: GET
      params:
        - name: childId
          value: "{{childId}}"
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 3,
            "fatherId": 1,
            "name": "Doku-Kind",
            "birthYear": null,
            "grade": null,
            "schoolType": "None",
            "createdAt": "2026-07-07T21:03:40.3706205",
            "coins": 0,
            "gems": 0
          }
  - name: Fremdes Kind lesen (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 404, Code `not_found`."
    request:
      url: "{{baseUrl}}/api/v1/children/:childId"
      method: GET
      params:
        - name: childId
          value: "{{childId}}"
          type: path
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/not_found",
            "title": "Resource not found.",
            "status": 404,
            "detail": "Child not found.",
            "code": "not_found",
            "traceId": "<trace-id>"
          }

docs: |-
  # Ein einzelnes Kind.

  `GET /api/v1/children/{childId}`
