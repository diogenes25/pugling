info:
  name: Erstellt eine Vokabel. Fehlt der Key, wird ein eindeutiger generiert; BaseFormKey (falls gesetzt) muss existieren.
  type: http
  seq: 2
  tags:
    - Learn – Vocabulary Store

http:
  method: POST
  url: "{{baseUrl}}/api/v1/learn/vocabulary"
  body:
    type: json
    data: |-
      {
        "key": "en_doku_de_beispiel",
        "sourceLanguage": "en",
        "targetLanguage": "de",
        "word": "example",
        "translation": "Beispiel",
        "partOfSpeech": "Noun"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('vocabularyId', body.vocabularyId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Vokabel anlegen
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 201."
    request:
      url: "{{baseUrl}}/api/v1/learn/vocabulary"
      method: POST
      body:
        type: json
        data: |-
          {
            "key": "en_doku_de_beispiel",
            "sourceLanguage": "en",
            "targetLanguage": "de",
            "word": "example",
            "translation": "Beispiel",
            "partOfSpeech": "Noun"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 26,
            "key": "en_doku_de_beispiel",
            "version": "1.0",
            "sourceLanguage": "en",
            "targetLanguage": "de",
            "word": "example",
            "translation": "Beispiel",
            "partOfSpeech": "Noun",
            "noun": null,
            "verb": null,
            "baseFormId": null,
            "baseFormKey": null,
            "baseFormRelation": null,
            "pronunciationAudioUrl": null,
            "tags": [],
            "createdAt": "<timestamp>"
          }
  - name: Vokabel mit doppeltem Key (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 409, Code `duplicate_key`."
    request:
      url: "{{baseUrl}}/api/v1/learn/vocabulary"
      method: POST
      body:
        type: json
        data: |-
          {
            "key": "en_doku_de_beispiel",
            "sourceLanguage": "en",
            "targetLanguage": "de",
            "word": "example",
            "translation": "Beispiel",
            "partOfSpeech": "Noun"
          }
    response:
      status: 409
      statusText: Conflict
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/duplicate_key",
            "title": "Key already exists.",
            "status": 409,
            "detail": "Key 'en_doku_de_beispiel' already exists.",
            "code": "duplicate_key",
            "traceId": "<trace-id>"
          }

docs: |-
  # Erstellt eine Vokabel. Fehlt der Key, wird ein eindeutiger generiert; BaseFormKey (falls gesetzt) muss existieren.

  `POST /api/v1/learn/vocabulary`
