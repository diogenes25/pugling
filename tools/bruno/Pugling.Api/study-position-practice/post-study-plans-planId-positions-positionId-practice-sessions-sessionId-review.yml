info:
  name: "Nimmt die Antwort zu einer Übungskarte entgegen, bewertet sie serverseitig gegen die Item-Lösung und protokolliert die Wiederholung. Bei Leitner-Positionen wandert das Atom die Box hoch/runter, richtige Antworten bringen Punkte (+ Combo-/Speed-Bonus). Anti-Farming: gewertet wird nur eine fällige Karte und höchstens einmal pro Tag; nicht-getippte Selbsteinschätzung zählt bei bool PlanPosition.RequireTypedTest nicht."
  type: http
  seq: 6
  tags:
    - Study – Position Practice

http:
  method: POST
  url: "{{baseUrl}}/api/v1/study-plans/:planId/positions/:positionId/practice-sessions/:sessionId/review"
  params:
    - name: planId
      value: "{{planId}}"
      type: path
    - name: positionId
      value: "{{positionId}}"
      type: path
    - name: sessionId
      value: "{{sessionId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "itemIndex": 0,
        "givenAnswer": "hallo"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setVar(name, value);
          bru.setEnvVar(name, String(value), { persist: true });
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('planId', body.planId ?? body.id);
          capture('positionId', body.positionId ?? body.id);
          capture('sessionId', body.sessionId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Karte bewerten (Review)
    description: "Verifiziert durch DocsCaptureTests: Rolle `child`, erwartet HTTP 200."
    request:
      url: "{{baseUrl}}/api/v1/study-plans/:planId/positions/:positionId/practice-sessions/:sessionId/review"
      method: POST
      params:
        - name: planId
          value: "{{planId}}"
          type: path
        - name: positionId
          value: "{{positionId}}"
          type: path
        - name: sessionId
          value: "{{sessionId}}"
          type: path
      body:
        type: json
        data: |-
          {
            "itemIndex": 0,
            "givenAnswer": "hallo"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "wasCorrect": true,
            "expected": "hallo",
            "awarded": 10,
            "box": 2,
            "dueOn": "2026-07-08",
            "combo": 1,
            "comboBonus": 0,
            "speedBonus": 0
          }

docs: |-
  # Nimmt die Antwort zu einer Übungskarte entgegen, bewertet sie serverseitig gegen die Item-Lösung und protokolliert die Wiederholung. Bei Leitner-Positionen wandert das Atom die Box hoch/runter, richtige Antworten bringen Punkte (+ Combo-/Speed-Bonus). Anti-Farming: gewertet wird nur eine fällige Karte und höchstens einmal pro Tag; nicht-getippte Selbsteinschätzung zählt bei bool PlanPosition.RequireTypedTest nicht.

  `POST /api/v1/study-plans/{planId}/positions/{positionId}/practice-sessions/{sessionId}/review`
