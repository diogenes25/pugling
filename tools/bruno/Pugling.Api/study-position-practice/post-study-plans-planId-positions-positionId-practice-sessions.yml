info:
  name: Startet eine Übungssitzung für die Position. Day nur zum Nachtragen (Vater); sonst heute.
  type: http
  seq: 1
  tags:
    - Study – Position Practice

http:
  method: POST
  url: "{{baseUrl}}/api/v1/study-plans/:planId/positions/:positionId/practice-sessions"
  params:
    - name: planId
      value: "{{planId}}"
      type: path
    - name: positionId
      value: "{{positionId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "mode": "Lern"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('planId', body.planId ?? body.id);
          capture('positionId', body.positionId ?? body.id);
          capture('sessionId', body.sessionId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Übungssitzung starten (Lern-Modus)
    description: "Verifiziert durch DocsCaptureTests: Rolle `child`, erwartet HTTP 201."
    request:
      url: "{{baseUrl}}/api/v1/study-plans/:planId/positions/:positionId/practice-sessions"
      method: POST
      params:
        - name: planId
          value: "{{planId}}"
          type: path
        - name: positionId
          value: "{{positionId}}"
          type: path
      body:
        type: json
        data: |-
          {
            "mode": "Lern"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 1,
            "planId": 2,
            "positionId": 2,
            "day": "2026-07-07",
            "startedAt": "<timestamp>",
            "endedAt": null,
            "activeSeconds": 0,
            "reviewCount": 0,
            "mode": "Lern",
            "cursor": 0,
            "total": 2
          }
  - name: Übungssitzung starten (Info-Modus, freies Üben)
    description: "Verifiziert durch DocsCaptureTests: Rolle `child`, erwartet HTTP 201."
    request:
      url: "{{baseUrl}}/api/v1/study-plans/:planId/positions/:positionId/practice-sessions"
      method: POST
      params:
        - name: planId
          value: "{{planId}}"
          type: path
        - name: positionId
          value: "{{positionId}}"
          type: path
      body:
        type: json
        data: |-
          {
            "mode": "Info"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 2,
            "planId": 2,
            "positionId": 2,
            "day": "2026-07-07",
            "startedAt": "<timestamp>",
            "endedAt": null,
            "activeSeconds": 0,
            "reviewCount": 0,
            "mode": "Info",
            "cursor": 0,
            "total": 1
          }
  - name: Deaktivierten Plan spielen (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `child`, erwartet HTTP 403, Code `plan_inactive`."
    request:
      url: "{{baseUrl}}/api/v1/study-plans/:planId/positions/:positionId/practice-sessions"
      method: POST
      params:
        - name: planId
          value: "{{planId}}"
          type: path
        - name: positionId
          value: "{{positionId}}"
          type: path
      body:
        type: json
        data: |-
          {}
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/plan_inactive",
            "title": "Study plan is not active.",
            "status": 403,
            "detail": "This study plan is not currently active. Ask your parent.",
            "code": "plan_inactive",
            "traceId": "<trace-id>"
          }

docs: |-
  # Startet eine Übungssitzung für die Position. Day nur zum Nachtragen (Vater); sonst heute.

  `POST /api/v1/study-plans/{planId}/positions/{positionId}/practice-sessions`
