info:
  name: Liefert alle Karten der Sitzung in der beim Start eingefrorenen Reihenfolge – für den Info-Modus (freies Üben, Frontend iteriert) und als Offline-Fallback des Lern-Modus (Antworten werden gepuffert und bei Reconnect über Task&lt;ActionResult&lt;ReviewOutcome&gt;&gt; PositionPracticeController.Review(int planId, int positionId, int sessionId, ReviewDto dto) nachgesendet). Der Lern-Modus nutzt sonst Task&lt;ActionResult&lt;NextResponse&gt;&gt; PositionPracticeController.Next(int planId, int positionId, int sessionId).
  type: http
  seq: 3
  tags:
    - Study – Position Practice

http:
  method: GET
  url: "{{baseUrl}}/api/v1/study-plans/:planId/positions/:positionId/practice-sessions/:sessionId/cards"
  params:
    - name: planId
      value: "{{planId}}"
      type: path
    - name: positionId
      value: "{{positionId}}"
      type: path
    - name: sessionId
      value: "{{sessionId}}"
      type: path
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('planId', body.planId ?? body.id);
          capture('positionId', body.positionId ?? body.id);
          capture('sessionId', body.sessionId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Karten am Stück (Info-Modus/Offline-Batch)
    description: "Verifiziert durch DocsCaptureTests: Rolle `child`, erwartet HTTP 200."
    request:
      url: "{{baseUrl}}/api/v1/study-plans/:planId/positions/:positionId/practice-sessions/:sessionId/cards"
      method: GET
      params:
        - name: planId
          value: "{{planId}}"
          type: path
        - name: positionId
          value: "{{positionId}}"
          type: path
        - name: sessionId
          value: "{{sessionId}}"
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "itemIndex": 1,
              "stage": 4,
              "type": "Vocabulary",
              "prompt": "goodbye",
              "hint": null,
              "answerLength": null,
              "reveal": null,
              "choices": null,
              "audioUrl": null
            }
          ]

docs: |-
  # Liefert alle Karten der Sitzung in der beim Start eingefrorenen Reihenfolge – für den Info-Modus (freies Üben, Frontend iteriert) und als Offline-Fallback des Lern-Modus (Antworten werden gepuffert und bei Reconnect über Task&lt;ActionResult&lt;ReviewOutcome&gt;&gt; PositionPracticeController.Review(int planId, int positionId, int sessionId, ReviewDto dto) nachgesendet). Der Lern-Modus nutzt sonst Task&lt;ActionResult&lt;NextResponse&gt;&gt; PositionPracticeController.Next(int planId, int positionId, int sessionId).

  `GET /api/v1/study-plans/{planId}/positions/{positionId}/practice-sessions/{sessionId}/cards`
