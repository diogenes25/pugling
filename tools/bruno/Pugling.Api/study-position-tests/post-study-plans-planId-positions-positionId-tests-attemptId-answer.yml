info:
  name: "Nimmt die Antwort zur aktuellen Prüfungsfrage entgegen, bewertet sie serverseitig (und protokolliert den plan-übergreifenden Item-Fortschritt), gibt die Korrektheit aber NICHT zurück (echte Klausur: Feedback erst bei Task&lt;ActionResult&lt;SubmitResponse&gt;&gt; PositionTestsController.Submit(int planId, int positionId, int attemptId, SubmitDto dto)). Adressiert wird stets die Cursor-Frage – der Client kann die Reihenfolge nicht umgehen. Danach rückt der Cursor eine Frage weiter."
  type: http
  seq: 3
  tags:
    - Study – Position Tests

http:
  method: POST
  url: "{{baseUrl}}/api/v1/study-plans/:planId/positions/:positionId/tests/:attemptId/answer"
  params:
    - name: planId
      value: "{{planId}}"
      type: path
    - name: positionId
      value: "{{positionId}}"
      type: path
    - name: attemptId
      value: "{{attemptId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "givenAnswer": "hallo"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('planId', body.planId ?? body.id);
          capture('positionId', body.positionId ?? body.id);
          capture('attemptId', body.attemptId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Prüfungsantwort abgeben (ohne Korrektheit)
    description: "Verifiziert durch DocsCaptureTests: Rolle `child`, erwartet HTTP 200."
    request:
      url: "{{baseUrl}}/api/v1/study-plans/:planId/positions/:positionId/tests/:attemptId/answer"
      method: POST
      params:
        - name: planId
          value: "{{planId}}"
          type: path
        - name: positionId
          value: "{{positionId}}"
          type: path
        - name: attemptId
          value: "{{attemptId}}"
          type: path
      body:
        type: json
        data: |-
          {
            "givenAnswer": "hallo"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "done": true,
            "cursor": 1,
            "total": 1
          }

docs: |-
  # Nimmt die Antwort zur aktuellen Prüfungsfrage entgegen, bewertet sie serverseitig (und protokolliert den plan-übergreifenden Item-Fortschritt), gibt die Korrektheit aber NICHT zurück (echte Klausur: Feedback erst bei Task&lt;ActionResult&lt;SubmitResponse&gt;&gt; PositionTestsController.Submit(int planId, int positionId, int attemptId, SubmitDto dto)). Adressiert wird stets die Cursor-Frage – der Client kann die Reihenfolge nicht umgehen. Danach rückt der Cursor eine Frage weiter.

  `POST /api/v1/study-plans/{planId}/positions/{positionId}/tests/{attemptId}/answer`
