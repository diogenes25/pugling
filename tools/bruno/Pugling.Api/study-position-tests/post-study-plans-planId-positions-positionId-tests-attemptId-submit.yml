info:
  name: Schließt den Versuch ab und liefert das Ergebnis (inkl. Lösungen). Im Klausur-Modus wurden die Antworten bereits schrittweise über Task&lt;ActionResult&lt;AnswerAck&gt;&gt; PositionTestsController.Answer(int planId, int positionId, int attemptId, AnswerDto dto) bewertet; hier wird nur aggregiert. Wird ausnahmsweise ein dto mit Antworten übergeben (Bulk-Abgabe), werden diese noch serverseitig bewertet.
  type: http
  seq: 5
  tags:
    - Study – Position Tests

http:
  method: POST
  url: "{{baseUrl}}/api/v1/study-plans/:planId/positions/:positionId/tests/:attemptId/submit"
  params:
    - name: planId
      value: "{{planId}}"
      type: path
    - name: positionId
      value: "{{positionId}}"
      type: path
    - name: attemptId
      value: "{{attemptId}}"
      type: path
  body:
    type: json
    data: |-
      {}
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('planId', body.planId ?? body.id);
          capture('positionId', body.positionId ?? body.id);
          capture('attemptId', body.attemptId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Test abgeben (auswerten)
    description: "Verifiziert durch DocsCaptureTests: Rolle `child`, erwartet HTTP 200."
    request:
      url: "{{baseUrl}}/api/v1/study-plans/:planId/positions/:positionId/tests/:attemptId/submit"
      method: POST
      params:
        - name: planId
          value: "{{planId}}"
          type: path
        - name: positionId
          value: "{{positionId}}"
          type: path
        - name: attemptId
          value: "{{attemptId}}"
          type: path
      body:
        type: json
        data: |-
          {}
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "attemptId": 1,
            "stage": 4,
            "totalItems": 1,
            "correctItems": 1,
            "scorePercent": 100,
            "passed": true,
            "passPercent": 80,
            "items": [
              {
                "itemIndex": 0,
                "prompt": "hello",
                "expected": "hallo",
                "givenAnswer": "hallo",
                "wasCorrect": true
              }
            ]
          }
  - name: Test erneut abgeben (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `child`, erwartet HTTP 400, Code `test_already_submitted`."
    request:
      url: "{{baseUrl}}/api/v1/study-plans/:planId/positions/:positionId/tests/:attemptId/submit"
      method: POST
      params:
        - name: planId
          value: "{{planId}}"
          type: path
        - name: positionId
          value: "{{positionId}}"
          type: path
        - name: attemptId
          value: "{{attemptId}}"
          type: path
      body:
        type: json
        data: |-
          {}
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/test_already_submitted",
            "title": "Test already submitted.",
            "status": 400,
            "detail": "The test has already been submitted.",
            "code": "test_already_submitted",
            "traceId": "<trace-id>"
          }

docs: |-
  # Schließt den Versuch ab und liefert das Ergebnis (inkl. Lösungen). Im Klausur-Modus wurden die Antworten bereits schrittweise über Task&lt;ActionResult&lt;AnswerAck&gt;&gt; PositionTestsController.Answer(int planId, int positionId, int attemptId, AnswerDto dto) bewertet; hier wird nur aggregiert. Wird ausnahmsweise ein dto mit Antworten übergeben (Bulk-Abgabe), werden diese noch serverseitig bewertet.

  `POST /api/v1/study-plans/{planId}/positions/{positionId}/tests/{attemptId}/submit`
