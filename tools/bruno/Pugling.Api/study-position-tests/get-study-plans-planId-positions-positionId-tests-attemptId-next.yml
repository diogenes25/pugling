info:
  name: Liefert die aktuelle Prüfungsfrage an der Cursor-Position (One-at-a-time, kein Zurück). Seit dem Start entfernte Items werden übersprungen. Am Ende der Reihenfolge kommt bool TestNextResponse.Done.
  type: http
  seq: 4
  tags:
    - Study – Position Tests

http:
  method: GET
  url: "{{baseUrl}}/api/v1/study-plans/:planId/positions/:positionId/tests/:attemptId/next"
  params:
    - name: planId
      value: "{{planId}}"
      type: path
    - name: positionId
      value: "{{positionId}}"
      type: path
    - name: attemptId
      value: "{{attemptId}}"
      type: path
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('planId', body.planId ?? body.id);
          capture('positionId', body.positionId ?? body.id);
          capture('attemptId', body.attemptId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Nächste Prüfungsfrage (One-at-a-time)
    description: "Verifiziert durch DocsCaptureTests: Rolle `child`, erwartet HTTP 200."
    request:
      url: "{{baseUrl}}/api/v1/study-plans/:planId/positions/:positionId/tests/:attemptId/next"
      method: GET
      params:
        - name: planId
          value: "{{planId}}"
          type: path
        - name: positionId
          value: "{{positionId}}"
          type: path
        - name: attemptId
          value: "{{attemptId}}"
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "item": {
              "itemIndex": 0,
              "prompt": "hello",
              "stage": 4,
              "reveal": null,
              "answerLength": null,
              "hint": null,
              "choices": null,
              "audioUrl": null
            },
            "done": false,
            "cursor": 0,
            "total": 1
          }

docs: |-
  # Liefert die aktuelle Prüfungsfrage an der Cursor-Position (One-at-a-time, kein Zurück). Seit dem Start entfernte Items werden übersprungen. Am Ende der Reihenfolge kommt bool TestNextResponse.Done.

  `GET /api/v1/study-plans/{planId}/positions/{positionId}/tests/{attemptId}/next`
