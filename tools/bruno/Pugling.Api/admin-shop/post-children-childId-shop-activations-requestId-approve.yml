info:
  name: Genehmigt eine offene Aktivierungsanfrage; das Inventar des Kindes wird reduziert.
  type: http
  seq: 2
  tags:
    - Admin – Shop

http:
  method: POST
  url: "{{baseUrl}}/api/v1/children/:childId/shop/activations/:requestId/approve"
  params:
    - name: childId
      value: "{{childId}}"
      type: path
    - name: requestId
      value: "{{requestId}}"
      type: path
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('childId', body.childId ?? body.id);
          capture('requestId', body.requestId ?? body.id);
          capture('activationId', body.activationId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Aktivierung genehmigen
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 200."
    request:
      url: "{{baseUrl}}/api/v1/children/:childId/shop/activations/:requestId/approve"
      method: POST
      params:
        - name: childId
          value: "{{childId}}"
          type: path
        - name: requestId
          value: "{{requestId}}"
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 1,
            "childId": 6,
            "shopArticleId": 5,
            "articleTitle": "Fernsehzeit (30 Min)",
            "unitType": "Minute",
            "actionType": "TV",
            "requestedQuantity": 30,
            "status": "Approved",
            "requestedAt": "2026-07-07T22:33:08.5545073",
            "closedAt": "<timestamp>",
            "canApprove": false,
            "canReject": false
          }
  - name: Aktivierung genehmigen (Inventar erschöpft) (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 400, Code `insufficient_inventory`."
    request:
      url: "{{baseUrl}}/api/v1/children/:childId/shop/activations/:requestId/approve"
      method: POST
      params:
        - name: childId
          value: "{{childId}}"
          type: path
        - name: requestId
          value: "{{requestId}}"
          type: path
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/insufficient_inventory",
            "title": "Not enough units in inventory.",
            "status": 400,
            "detail": "Not enough units left in the child's inventory to approve this request.",
            "code": "insufficient_inventory",
            "traceId": "<trace-id>"
          }
  - name: Aktivierung erneut genehmigen (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 409, Code `activation_not_pending`."
    request:
      url: "{{baseUrl}}/api/v1/children/:childId/shop/activations/:requestId/approve"
      method: POST
      params:
        - name: childId
          value: "{{childId}}"
          type: path
        - name: requestId
          value: "{{requestId}}"
          type: path
    response:
      status: 409
      statusText: Conflict
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/activation_not_pending",
            "title": "Activation request is not pending.",
            "status": 409,
            "detail": "This activation request is not pending.",
            "code": "activation_not_pending",
            "traceId": "<trace-id>"
          }

docs: |-
  # Genehmigt eine offene Aktivierungsanfrage; das Inventar des Kindes wird reduziert.

  `POST /api/v1/children/{childId}/shop/activations/{requestId}/approve`
