info:
  name: Legt ein neues Angebot für einen Artikel an (mit Preis, Menge und Bestand).
  type: http
  seq: 13
  tags:
    - Admin – Shop

http:
  method: POST
  url: "{{baseUrl}}/api/v1/shop/articles/:articleId/listings"
  params:
    - name: articleId
      value: "{{articleId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "title": "30 Min Fernsehen",
        "description": "Einmalige Halbstunde",
        "coinPrice": 120,
        "gemPrice": 0,
        "unitsPerPurchase": 30,
        "currentStock": 5,
        "maxStock": 5
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('articleId', body.articleId ?? body.id);
          capture('listingId', body.listingId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Angebot anlegen
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 201."
    request:
      url: "{{baseUrl}}/api/v1/shop/articles/:articleId/listings"
      method: POST
      params:
        - name: articleId
          value: "{{articleId}}"
          type: path
      body:
        type: json
        data: |-
          {
            "title": "30 Min Fernsehen",
            "description": "Einmalige Halbstunde",
            "coinPrice": 120,
            "gemPrice": 0,
            "unitsPerPurchase": 30,
            "currentStock": 5,
            "maxStock": 5
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 7,
            "shopArticleId": 5,
            "articleNumber": "TV-900",
            "articleTitle": "Fernsehzeit (30 Min)",
            "title": "30 Min Fernsehen",
            "description": "Einmalige Halbstunde",
            "coinPrice": 120,
            "gemPrice": 0,
            "unitsPerPurchase": 30,
            "active": true,
            "currentStock": 5,
            "maxStock": 5,
            "refillKind": "None",
            "refillAtUtc": null,
            "refillDayOfWeek": null,
            "lastRefilledAtUtc": null,
            "createdAt": "<timestamp>"
          }
  - name: Angebot anlegen (ungültiger Preis) (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 400, Code `validation_error`."
    request:
      url: "{{baseUrl}}/api/v1/shop/articles/:articleId/listings"
      method: POST
      params:
        - name: articleId
          value: "{{articleId}}"
          type: path
      body:
        type: json
        data: |-
          {
            "coinPrice": 0,
            "gemPrice": 0,
            "unitsPerPurchase": 30,
            "currentStock": 5,
            "maxStock": 5
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/validation_error",
            "title": "Invalid request.",
            "status": 400,
            "detail": "At least one price must be positive.",
            "code": "validation_error",
            "traceId": "<trace-id>"
          }

docs: |-
  # Legt ein neues Angebot für einen Artikel an (mit Preis, Menge und Bestand).

  `POST /api/v1/shop/articles/{articleId}/listings`
