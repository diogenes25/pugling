info:
  name: Löscht eine Übung. Nicht möglich, solange sie in einem Lehrplan oder einer Klassenarbeit steckt.
  type: http
  seq: 3
  tags:
    - Learn – Vocabulary

http:
  method: DELETE
  url: "{{baseUrl}}/api/v1/learn/subjects/:subjectId/chapters/:chapterId/vocabulary/:exerciseId"
  params:
    - name: subjectId
      value: "{{subjectId}}"
      type: path
    - name: chapterId
      value: "{{chapterId}}"
      type: path
    - name: exerciseId
      value: "{{exerciseId}}"
      type: path
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setVar(name, value);
          bru.setEnvVar(name, String(value), { persist: true });
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('subjectId', body.subjectId ?? body.id);
          capture('chapterId', body.chapterId ?? body.id);
          capture('exerciseId', body.exerciseId ?? body.id);
          capture('vocabularyId', body.vocabularyId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Verwendete Übung löschen (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 409, Code `exercise_in_use`."
    request:
      url: "{{baseUrl}}/api/v1/learn/subjects/:subjectId/chapters/:chapterId/vocabulary/:exerciseId"
      method: DELETE
      params:
        - name: subjectId
          value: "{{subjectId}}"
          type: path
        - name: chapterId
          value: "{{chapterId}}"
          type: path
        - name: exerciseId
          value: "{{exerciseId}}"
          type: path
    response:
      status: 409
      statusText: Conflict
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/exercise_in_use",
            "title": "Exercise is in use.",
            "status": 409,
            "detail": "The exercise is used in a study plan or a class test and cannot be deleted.",
            "code": "exercise_in_use",
            "traceId": "<trace-id>"
          }

docs: |-
  # Löscht eine Übung. Nicht möglich, solange sie in einem Lehrplan oder einer Klassenarbeit steckt.

  `DELETE /api/v1/learn/subjects/{subjectId}/chapters/{chapterId}/vocabulary/{exerciseId}`
