info:
  name: PUT /api/v1/learn/subjects/{subjectId}/chapters/{chapterId}/vocabulary/{exerciseId}
  type: http
  seq: 5
  tags:
    - Learn – Vocabulary

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/learn/subjects/:subjectId/chapters/:chapterId/vocabulary/:exerciseId"
  params:
    - name: subjectId
      value: "{{subjectId}}"
      type: path
    - name: chapterId
      value: "{{chapterId}}"
      type: path
    - name: exerciseId
      value: "{{exerciseId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "title": "Übernahmeversuch",
        "orderIndex": 1,
        "rewardPoints": 1,
        "config": {}
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('subjectId', body.subjectId ?? body.id);
          capture('chapterId', body.chapterId ?? body.id);
          capture('exerciseId', body.exerciseId ?? body.id);
          capture('vocabularyId', body.vocabularyId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Fremd-Autor-Übung bearbeiten (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 403, Code `not_author`."
    request:
      url: "{{baseUrl}}/api/v1/learn/subjects/:subjectId/chapters/:chapterId/vocabulary/:exerciseId"
      method: PUT
      params:
        - name: subjectId
          value: "{{subjectId}}"
          type: path
        - name: chapterId
          value: "{{chapterId}}"
          type: path
        - name: exerciseId
          value: "{{exerciseId}}"
          type: path
      body:
        type: json
        data: |-
          {
            "title": "Übernahmeversuch",
            "orderIndex": 1,
            "rewardPoints": 1,
            "config": {}
          }
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/not_author",
            "title": "Access denied.",
            "status": 403,
            "detail": "This exercise belongs to another father and can only be modified or deleted by its author.",
            "code": "not_author",
            "traceId": "<trace-id>"
          }

docs: |-
  # PUT /api/v1/learn/subjects/{subjectId}/chapters/{chapterId}/vocabulary/{exerciseId}

  `PUT /api/v1/learn/subjects/{subjectId}/chapters/{chapterId}/vocabulary/{exerciseId}`
