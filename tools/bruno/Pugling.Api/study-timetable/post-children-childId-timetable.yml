info:
  name: Trägt ein Fach an einem Wochentag ein.
  type: http
  seq: 2
  tags:
    - Study – Timetable

http:
  method: POST
  url: "{{baseUrl}}/api/v1/children/:childId/timetable"
  params:
    - name: childId
      value: "{{childId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "subjectId": "{{subjectId}}",
        "dayOfWeek": "Tuesday",
        "timeOfDay": "Nachmittag"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('childId', body.childId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Stundenplan-Eintrag anlegen
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 201."
    request:
      url: "{{baseUrl}}/api/v1/children/:childId/timetable"
      method: POST
      params:
        - name: childId
          value: "{{childId}}"
          type: path
      body:
        type: json
        data: |-
          {
            "subjectId": 5,
            "dayOfWeek": "Tuesday",
            "timeOfDay": "Nachmittag"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 1,
            "childId": 1,
            "subjectId": 5,
            "subjectName": "Doku-Fach",
            "dayOfWeek": "Tuesday",
            "timeOfDay": "Nachmittag"
          }
  - name: Gleiches Fach am selben Wochentag (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 409, Code `timetable_slot_taken`."
    request:
      url: "{{baseUrl}}/api/v1/children/:childId/timetable"
      method: POST
      params:
        - name: childId
          value: "{{childId}}"
          type: path
      body:
        type: json
        data: |-
          {
            "subjectId": 5,
            "dayOfWeek": "Tuesday",
            "timeOfDay": "Vormittag"
          }
    response:
      status: 409
      statusText: Conflict
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/timetable_slot_taken",
            "title": "Timetable slot already taken.",
            "status": 409,
            "detail": "This subject is already scheduled on this weekday.",
            "code": "timetable_slot_taken",
            "traceId": "<trace-id>"
          }

docs: |-
  # Trägt ein Fach an einem Wochentag ein.

  `POST /api/v1/children/{childId}/timetable`
