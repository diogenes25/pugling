info:
  name: Erzeugt einen Zufallssatz nach den gespeicherten Regeln. Zurückgegeben wird auch der verwendete `Seed` – ihn beim späteren Task&lt;ActionResult&lt;CheckResult&gt;&gt; ArithmeticDrillController.Check(int subjectId, int chapterId, int exerciseId, CheckDrillDto body) mitschicken, damit exakt dieser Satz bewertet wird.
  type: http
  seq: 7
  tags:
    - Learn – Arithmetic Drill

http:
  method: POST
  url: "{{baseUrl}}/api/v1/learn/subjects/:subjectId/chapters/:chapterId/arithmetic-drill/:exerciseId/generate"
  params:
    - name: subjectId
      value: "{{subjectId}}"
      type: path
    - name: chapterId
      value: "{{chapterId}}"
      type: path
    - name: exerciseId
      value: "{{exerciseId}}"
      type: path
    - name: seed
      value: ""
      type: query
      disabled: true
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('subjectId', body.subjectId ?? body.id);
          capture('chapterId', body.chapterId ?? body.id);
          capture('exerciseId', body.exerciseId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  # Erzeugt einen Zufallssatz nach den gespeicherten Regeln. Zurückgegeben wird auch der verwendete `Seed` – ihn beim späteren Task&lt;ActionResult&lt;CheckResult&gt;&gt; ArithmeticDrillController.Check(int subjectId, int chapterId, int exerciseId, CheckDrillDto body) mitschicken, damit exakt dieser Satz bewertet wird.

  `POST /api/v1/learn/subjects/{subjectId}/chapters/{chapterId}/arithmetic-drill/{exerciseId}/generate`
