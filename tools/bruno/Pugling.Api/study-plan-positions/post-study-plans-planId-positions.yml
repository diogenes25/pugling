info:
  name: Fügt dem Lehrplan eine Position auf eine Katalog-Übung hinzu.
  type: http
  seq: 2
  tags:
    - Study – Plan Positions

http:
  method: POST
  url: "{{baseUrl}}/api/v1/study-plans/:planId/positions"
  params:
    - name: planId
      value: "{{planId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "exerciseId": "{{exerciseId}}",
        "useLeitner": true,
        "stage": 4,
        "cadence": "Daily"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setVar(name, value);
          bru.setEnvVar(name, String(value), { persist: true });
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('planId', body.planId ?? body.id);
          capture('positionId', body.positionId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Position anlegen
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 201."
    request:
      url: "{{baseUrl}}/api/v1/study-plans/:planId/positions"
      method: POST
      params:
        - name: planId
          value: "{{planId}}"
          type: path
      body:
        type: json
        data: |-
          {
            "exerciseId": 13,
            "useLeitner": true,
            "stage": 4,
            "cadence": "Daily"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 2,
            "studyPlanId": 2,
            "exerciseId": 13,
            "exerciseTitle": "Begrüßungen",
            "exerciseType": "Vocabulary",
            "order": 0,
            "stage": 4,
            "itemCount": null,
            "scope": "All",
            "cadence": "Daily",
            "goalThreshold": null,
            "requireTypedTest": false,
            "useLeitner": true,
            "maxBox": 5,
            "boxIntervalDays": null,
            "stageSchedule": null,
            "pointsGoalMet": 20,
            "newContentPoints": 10,
            "comboThreshold": 5,
            "comboBonusPoints": 5,
            "speedThresholdSeconds": 0,
            "speedBonusPoints": 0
          }
  - name: Position mit unbekannter Übung (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 400, Code `invalid_reference`."
    request:
      url: "{{baseUrl}}/api/v1/study-plans/:planId/positions"
      method: POST
      params:
        - name: planId
          value: "{{planId}}"
          type: path
      body:
        type: json
        data: |-
          {
            "exerciseId": 999999
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/invalid_reference",
            "title": "Invalid request.",
            "status": 400,
            "detail": "Exercise 999999 not found.",
            "code": "invalid_reference",
            "traceId": "<trace-id>"
          }

docs: |-
  # Fügt dem Lehrplan eine Position auf eine Katalog-Übung hinzu.

  `POST /api/v1/study-plans/{planId}/positions`
