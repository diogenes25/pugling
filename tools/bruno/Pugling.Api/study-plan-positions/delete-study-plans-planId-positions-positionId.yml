info:
  name: Löscht eine Position (der zugehörige PositionItemProgress verschwindet per Cascade mit). Nicht möglich, solange bereits Testversuche für die Position vorliegen – sonst ginge diese Lernhistorie verloren (der Fremdschlüssel wäre sonst nur auf `null` gesetzt).
  type: http
  seq: 3
  tags:
    - Study – Plan Positions

http:
  method: DELETE
  url: "{{baseUrl}}/api/v1/study-plans/:planId/positions/:positionId"
  params:
    - name: planId
      value: "{{planId}}"
      type: path
    - name: positionId
      value: "{{positionId}}"
      type: path
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setVar(name, value);
          bru.setEnvVar(name, String(value), { persist: true });
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('planId', body.planId ?? body.id);
          capture('positionId', body.positionId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Bespielte Position löschen (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 409, Code `position_has_data`."
    request:
      url: "{{baseUrl}}/api/v1/study-plans/:planId/positions/:positionId"
      method: DELETE
      params:
        - name: planId
          value: "{{planId}}"
          type: path
        - name: positionId
          value: "{{positionId}}"
          type: path
    response:
      status: 409
      statusText: Conflict
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/position_has_data",
            "title": "Position has practice/test data.",
            "status": 409,
            "detail": "This position already has practice/test data and cannot be deleted.",
            "code": "position_has_data",
            "traceId": "<trace-id>"
          }

docs: |-
  # Löscht eine Position (der zugehörige PositionItemProgress verschwindet per Cascade mit). Nicht möglich, solange bereits Testversuche für die Position vorliegen – sonst ginge diese Lernhistorie verloren (der Fremdschlüssel wäre sonst nur auf `null` gesetzt).

  `DELETE /api/v1/study-plans/{planId}/positions/{positionId}`
