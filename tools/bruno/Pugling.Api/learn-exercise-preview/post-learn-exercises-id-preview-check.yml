info:
  name: Bewertet die Antworten wie im echten Test (server-autoritativ), aber ohne jede Persistenz oder Punktevergabe. Die Stufe muss dieselbe sein wie beim Laden (Task&lt;ActionResult&lt;PreviewData&gt;&gt; ExercisePreviewController.Get(int id, int? stage = null)), damit „getippt" nicht auseinanderdriftet.
  type: http
  seq: 2
  tags:
    - Learn – Exercise Preview

http:
  method: POST
  url: "{{baseUrl}}/api/v1/learn/exercises/:id/preview/check"
  params:
    - name: id
      value: "{{id}}"
      type: path
  body:
    type: json
    data: |-
      {
        "answers": [
          {
            "itemIndex": "string",
            "givenAnswer": "string",
            "wasKnown": "string"
          }
        ],
        "stage": "string"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setVar(name, value);
          bru.setEnvVar(name, String(value), { persist: true });
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('id', body.id ?? body.id);
          capture('exerciseId', body.exerciseId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  # Bewertet die Antworten wie im echten Test (server-autoritativ), aber ohne jede Persistenz oder Punktevergabe. Die Stufe muss dieselbe sein wie beim Laden (Task&lt;ActionResult&lt;PreviewData&gt;&gt; ExercisePreviewController.Get(int id, int? stage = null)), damit „getippt" nicht auseinanderdriftet.

  `POST /api/v1/learn/exercises/{id}/preview/check`
