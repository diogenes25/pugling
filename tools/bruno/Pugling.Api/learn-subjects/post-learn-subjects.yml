info:
  name: Erstellt ein Fach.
  type: http
  seq: 2
  tags:
    - Learn – Subjects

http:
  method: POST
  url: "{{baseUrl}}/api/v1/learn/subjects"
  body:
    type: json
    data: |-
      {
        "name": "Doku-Fach"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setVar(name, value);
          bru.setEnvVar(name, String(value), { persist: true });
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('subjectId', body.subjectId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Fach anlegen
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 201."
    request:
      url: "{{baseUrl}}/api/v1/learn/subjects"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "Doku-Fach"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 5,
            "name": "Doku-Fach",
            "createdAt": "<timestamp>",
            "chaptersCount": 0
          }
  - name: Fach ohne Namen anlegen (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 400, Code `validation_error`."
    request:
      url: "{{baseUrl}}/api/v1/learn/subjects"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": ""
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/validation_error",
            "title": "Invalid request.",
            "status": 400,
            "detail": "Name is required.",
            "code": "validation_error",
            "traceId": "<trace-id>"
          }

docs: |-
  # Erstellt ein Fach.

  `POST /api/v1/learn/subjects`
