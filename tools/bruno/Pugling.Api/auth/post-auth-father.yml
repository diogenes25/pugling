info:
  name: Vater-Login per Id + PIN.
  type: http
  seq: 2
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/father"
  body:
    type: json
    data: |-
      {
        "fatherId": "{{fatherId}}",
        "pin": "{{fatherPin}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        var jsonData = res.getBody();
        bru.setVar('token', jsonData.token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Vater-Login
    description: "Verifiziert durch DocsCaptureTests: Rolle `anonymous`, erwartet HTTP 200."
    request:
      url: "{{baseUrl}}/api/v1/auth/father"
      method: POST
      body:
        type: json
        data: |-
          {
            "fatherId": 1,
            "pin": "0000"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "token": "<redacted-jwt>",
            "role": "Vater",
            "id": 1,
            "name": "Papa",
            "expiresAt": "<timestamp>"
          }
  - name: Login mit nicht-numerischer fatherId (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `anonymous`, erwartet HTTP 400, Code `validation_error`."
    request:
      url: "{{baseUrl}}/api/v1/auth/father"
      method: POST
      body:
        type: json
        data: |-
          {
            "fatherId": "1a",
            "pin": "0000"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/validation_error",
            "title": "Invalid request.",
            "status": 400,
            "errors": {
              "fatherId": [
                "The value is not of the expected type."
              ]
            },
            "code": "validation_error",
            "traceId": "<trace-id>"
          }
  - name: Login mit falscher PIN (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `anonymous`, erwartet HTTP 401, Code `invalid_credentials`."
    request:
      url: "{{baseUrl}}/api/v1/auth/father"
      method: POST
      body:
        type: json
        data: |-
          {
            "fatherId": 1,
            "pin": "9998"
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/invalid_credentials",
            "title": "Invalid credentials.",
            "status": 401,
            "detail": "Invalid father ID or PIN.",
            "code": "invalid_credentials",
            "traceId": "<trace-id>"
          }

docs: |-
  # Vater-Login per Id + PIN.

  `POST /api/v1/auth/father`
