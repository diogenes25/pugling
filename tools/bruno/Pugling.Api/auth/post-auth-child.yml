info:
  name: Sohn-Login per Id + PIN.
  type: http
  seq: 1
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/child"
  body:
    type: json
    data: |-
      {
        "childId": "{{childId}}",
        "pin": "{{childPin}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        var jsonData = res.getBody();
        bru.setEnvVar('token', jsonData.token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Sohn-Login
    description: "Verifiziert durch DocsCaptureTests: Rolle `anonymous`, erwartet HTTP 200."
    request:
      url: "{{baseUrl}}/api/v1/auth/child"
      method: POST
      body:
        type: json
        data: |-
          {
            "childId": 1,
            "pin": "1111"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "token": "<redacted-jwt>",
            "role": "Sohn",
            "id": 1,
            "name": "Sohn",
            "expiresAt": "<timestamp>"
          }

docs: |-
  # Sohn-Login per Id + PIN.

  `POST /api/v1/auth/child`
