info:
  name: Legt einen Tag für ein Kind an (Name je Kind eindeutig).
  type: http
  seq: 2
  tags:
    - Learn – Tags

http:
  method: POST
  url: "{{baseUrl}}/api/v1/tags"
  body:
    type: json
    data: |-
      {
        "childId": "{{childId}}",
        "name": "Doku-Tag",
        "color": "#3b82f6"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('tagId', body.tagId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Tag anlegen (Vater)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 201."
    request:
      url: "{{baseUrl}}/api/v1/tags"
      method: POST
      body:
        type: json
        data: |-
          {
            "childId": 1,
            "name": "Doku-Tag",
            "color": "#3b82f6"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 3,
            "childId": 1,
            "name": "Doku-Tag",
            "color": "#3b82f6",
            "createdBy": "Vater",
            "exerciseCount": 0,
            "vocabularyCount": 0,
            "createdAt": "<timestamp>"
          }
  - name: Tag anlegen (Sohn)
    description: "Verifiziert durch DocsCaptureTests: Rolle `child`, erwartet HTTP 201."
    request:
      url: "{{baseUrl}}/api/v1/tags"
      method: POST
      body:
        type: json
        data: |-
          {
            "childId": 1,
            "name": "Sohn-Tag",
            "color": "#22c55e"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 4,
            "childId": 1,
            "name": "Sohn-Tag",
            "color": "#22c55e",
            "createdBy": "Sohn",
            "exerciseCount": 0,
            "vocabularyCount": 0,
            "createdAt": "<timestamp>"
          }
  - name: Tag mit doppeltem Namen (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 400, Code `duplicate_tag_name`."
    request:
      url: "{{baseUrl}}/api/v1/tags"
      method: POST
      body:
        type: json
        data: |-
          {
            "childId": 1,
            "name": "Doku-Tag"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/duplicate_tag_name",
            "title": "Tag name already exists.",
            "status": 400,
            "detail": "A tag with this name already exists for this child.",
            "code": "duplicate_tag_name",
            "traceId": "<trace-id>"
          }
  - name: Tag für fremdes Kind anlegen (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `father`, erwartet HTTP 403, Code `forbidden`."
    request:
      url: "{{baseUrl}}/api/v1/tags"
      method: POST
      body:
        type: json
        data: |-
          {
            "childId": 2,
            "name": "Fremd"
          }
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/forbidden",
            "title": "Forbidden",
            "status": 403,
            "traceId": "<trace-id>",
            "code": "forbidden"
          }

docs: |-
  # Legt einen Tag für ein Kind an (Name je Kind eindeutig).

  `POST /api/v1/tags`
