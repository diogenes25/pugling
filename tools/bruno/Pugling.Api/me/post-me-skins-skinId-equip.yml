info:
  name: Rüstet einen bereits freigeschalteten Skin aus (persistiert geräteübergreifend am Kind).
  type: http
  seq: 20
  tags:
    - Me

http:
  method: POST
  url: "{{baseUrl}}/api/v1/me/skins/:skinId/equip"
  params:
    - name: skinId
      value: "{{skinId}}"
      type: path
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setEnvVar(name, String(value));
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('skinId', body.skinId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Besessenen Skin ausrüsten
    description: "Verifiziert durch DocsCaptureTests: Rolle `child`, erwartet HTTP 200."
    request:
      url: "{{baseUrl}}/api/v1/me/skins/:skinId/equip"
      method: POST
      params:
        - name: skinId
          value: "{{skinId}}"
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "gems": 500,
            "selected": "pug",
            "owned": [
              "pug",
              "ninja"
            ]
          }
  - name: Nicht besessenen Skin ausrüsten (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `child`, erwartet HTTP 400, Code `skin_not_unlocked`."
    request:
      url: "{{baseUrl}}/api/v1/me/skins/:skinId/equip"
      method: POST
      params:
        - name: skinId
          value: "{{skinId}}"
          type: path
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/skin_not_unlocked",
            "title": "Skin not unlocked.",
            "status": 400,
            "detail": "This skin is not unlocked yet.",
            "code": "skin_not_unlocked",
            "traceId": "<trace-id>"
          }

docs: |-
  # Rüstet einen bereits freigeschalteten Skin aus (persistiert geräteübergreifend am Kind).

  `POST /api/v1/me/skins/{skinId}/equip`
