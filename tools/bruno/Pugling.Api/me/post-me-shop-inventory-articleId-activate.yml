info:
  name: "Stellt eine Aktivierungsanfrage: der Sohn möchte `quantity` Einheiten des Artikels verbrauchen. Der Vater genehmigt oder lehnt ab; das Inventar wird erst bei Genehmigung reduziert."
  type: http
  seq: 8
  tags:
    - Me

http:
  method: POST
  url: "{{baseUrl}}/api/v1/me/shop/inventory/:articleId/activate"
  params:
    - name: articleId
      value: "{{articleId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "quantity": 30
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        function capture(name, value) {
          if (value === undefined || value === null || value === '') return;
          bru.setVar(name, value);
          bru.setEnvVar(name, String(value), { persist: true });
        }

        if (body && typeof body === 'object' && !Array.isArray(body)) {
          capture('articleId', body.articleId ?? body.id);
          capture('fatherId', body.fatherId);
          capture('childId', body.childId);
          capture('subjectId', body.subjectId);
          capture('chapterId', body.chapterId);
          capture('categoryId', body.categoryId);
          capture('exerciseId', body.exerciseId);
          capture('planId', body.planId);
          capture('positionId', body.positionId);
          capture('sessionId', body.sessionId);
          capture('attemptId', body.attemptId);
          capture('tagId', body.tagId);
          capture('classTestId', body.classTestId);
          capture('missionId', body.missionId);
          capture('achievementId', body.achievementId);
          capture('rewardId', body.rewardId);
          capture('redemptionId', body.redemptionId);
          capture('articleId', body.articleId);
          capture('listingId', body.listingId);
          capture('purchaseId', body.purchaseId);
          capture('activationId', body.activationId);
          capture('vocabularyId', body.vocabularyId);
          capture('wordId', body.wordId);
          capture('skinId', body.skinId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Aktivierungsanfrage stellen
    description: "Verifiziert durch DocsCaptureTests: Rolle `child`, erwartet HTTP 200."
    request:
      url: "{{baseUrl}}/api/v1/me/shop/inventory/:articleId/activate"
      method: POST
      params:
        - name: articleId
          value: "{{articleId}}"
          type: path
      body:
        type: json
        data: |-
          {
            "quantity": 30
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 1,
            "shopArticleId": 5,
            "articleTitle": "Fernsehzeit (30 Min)",
            "unitType": "Minute",
            "actionType": "TV",
            "requestedQuantity": 30,
            "status": "Pending",
            "requestedAt": "<timestamp>",
            "closedAt": null
          }
  - name: Aktivierungsanfrage (Inventar erschöpft) (Fehlerfall)
    description: "Verifiziert durch DocsCaptureTests: Rolle `child`, erwartet HTTP 400, Code `insufficient_inventory`."
    request:
      url: "{{baseUrl}}/api/v1/me/shop/inventory/:articleId/activate"
      method: POST
      params:
        - name: articleId
          value: "{{articleId}}"
          type: path
      body:
        type: json
        data: |-
          {
            "quantity": 999
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "https://pugling.app/errors/insufficient_inventory",
            "title": "Not enough units in inventory.",
            "status": 400,
            "detail": "Not enough units in your inventory.",
            "code": "insufficient_inventory",
            "traceId": "<trace-id>"
          }

docs: |-
  # Stellt eine Aktivierungsanfrage: der Sohn möchte `quantity` Einheiten des Artikels verbrauchen. Der Vater genehmigt oder lehnt ab; das Inventar wird erst bei Genehmigung reduziert.

  `POST /api/v1/me/shop/inventory/{articleId}/activate`
