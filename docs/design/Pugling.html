  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"flex:1; border:none; background:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 0; color:{{ navAccountColor }};\"><span style=\"font-size:22px;\">💰<\u002Fspan><span style=\"font-size:10px; font-weight:900;\">Konto<\u002Fspan><\u002Fbutton>\n      <button onclick=\"{{ goShop }}\" style=\"flex:1; border:none; background:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 0; color:{{ navShopColor }};\"><span style=\"font-size:22px;\">🛒<\u002Fspan><span style=\"font-size:10px; font-weight:900;\">Shop<\u002Fspan><\u002Fbutton>\n      <button onclick=\"{{ goSkins }}\" style=\"flex:1; border:none; background:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 0; color:{{ navSkinsColor }};\"><span style=\"font-size:22px;\">🎭<\u002Fspan><span style=\"font-size:10px; font-weight:900;\">Skins<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== TOASTS ===== -->\n  <div style=\"position:absolute; top:70px; left:0; right:0; z-index:60; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none;\">\n    <sc-for list=\"{{ toasts }}\" as=\"t\" hint-placeholder-count=\"0\">\n      <div style=\"animation:toastIn .3s; background:rgba(20,22,48,.96); border:1px solid rgba(34,224,255,.4); color:#fff; font-weight:900; font-size:15px; padding:10px 18px; border-radius:999px; box-shadow:0 10px 30px rgba(0,0,0,.4);\">{{ t.text }}<\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- ===== CONFETTI LAYER (always on, non-blocking) ===== -->\n  <div style=\"position:absolute; inset:0; z-index:70; overflow:hidden; pointer-events:none;\">\n    <sc-for list=\"{{ confetti }}\" as=\"c\" hint-placeholder-count=\"0\">\n      <div style=\"{{ c.style }}\"><\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- ===== CELEBRATION OVERLAY (mid/big only) ===== -->\n  <sc-if value=\"{{ hasCele }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ dismissCele }}\" style=\"position:absolute; inset:0; z-index:80; display:flex; align-items:center; justify-content:center; background:rgba(6,7,20,.55); backdrop-filter:blur(2px);\">\n      <sc-if value=\"{{ celeBig }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center; animation:popIn .5s;\">\n          <div style=\"font-size:110px;\">{{ celeEmoji }}<\u002Fdiv>\n          <div style=\"font-family:'Titan One'; font-size:40px; color:#fff; text-shadow:0 4px 20px rgba(34,224,255,.6);\">{{ celeTitle }}<\u002Fdiv>\n          <div style=\"font-size:13px; font-weight:800; color:#9aa0d0; margin-top:10px;\">Tippen zum Fortfahren<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ celeBig }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"text-align:center; animation:popIn .45s;\">\n          <div style=\"font-size:64px;\">{{ celeEmoji }}<\u002Fdiv>\n          <div style=\"font-family:'Titan One'; font-size:26px; color:#fff;\">{{ celeTitle }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.heroes = [\n      { id:'pug', emoji:'🐶', name:'Pugling', desc:'Der treue Starter-Held', price:0, owned:true },\n      { id:'cat', emoji:'🐱', name:'Miez-Ninja', desc:'Schnell & lautlos', price:0, owned:true },\n      { id:'fox', emoji:'🦊', name:'Flink', desc:'Listig und flott', price:30, owned:false },\n      { id:'dragon', emoji:'🐲', name:'Glut', desc:'Speit Combos', price:60, owned:false },\n      { id:'robot', emoji:'🤖', name:'Bolt', desc:'Rechnet in Millisekunden', price:90, owned:false },\n      { id:'alien', emoji:'👾', name:'Zorx', desc:'Aus einer anderen Galaxie', price:140, owned:false },\n    ];\n    this.vocab = [\n      { stage:'Zeigen',     mode:'reveal', prompt:'der Apfel',  answer:'apple', hint:'Ein rotes Obst 🍎' },\n      { stage:'Tippen',     mode:'typed',  prompt:'das Haus',   answer:'house', hint:'Da wohnst du' },\n      { stage:'Auswahl',    mode:'choice', prompt:'der Hund',   answer:'dog', choices:['dog','cat','horse','bird'], hint:'Wuff!' },\n      { stage:'Buchstaben', mode:'letters',prompt:'die Katze',  answer:'cat', hint:'Miau 🐱' },\n      { stage:'Hören',      mode:'hear',   prompt:'book',       answer:'book', hint:'Zum Lesen 📖' },\n      { stage:'Tippen',     mode:'typed',  prompt:'die Sonne',  answer:'sun', hint:'Am Himmel ☀️' },\n    ];\n    this.testQ = [\n      { stage:'Auswahl', mode:'choice', prompt:'das Wasser', answer:'water', choices:['water','fire','milk','juice'] },\n      { stage:'Tippen',  mode:'typed',  prompt:'der Baum',   answer:'tree' },\n      { stage:'Auswahl', mode:'choice', prompt:'die Milch',  answer:'milk', choices:['bread','milk','egg','cheese'] },\n      { stage:'Tippen',  mode:'typed',  prompt:'das Buch',   answer:'book' },\n      { stage:'Auswahl', mode:'choice', prompt:'die Schule', answer:'school', choices:['house','church','school','shop'] },\n    ];\n    this.positions = [\n      { id:'p1', type:'Vokabeln',   icon:'🗂️', title:'Englisch · Basis 1', rhythm:'Tagesziel', due:8, status:'open', playable:true },\n      { id:'p2', type:'Lückentext', icon:'✏️', title:'Grammatik · Present', rhythm:'Tagesziel', due:0, status:'open', playable:false },\n      { id:'p3', type:'Zuordnung',  icon:'🔗', title:'Wortpaare Tiere',     rhythm:'Wochenziel', due:0, status:'open', playable:false },\n      { id:'p4', type:'Rechnen',    icon:'➗', title:'Kopfrechnen bis 100',  rhythm:'frei',       due:0, status:'open', playable:false },\n    ];\n    this.missions = [\n      { title:'10 Karten üben',    cur:8, tgt:10, period:'Heute',       reward:5,  done:false },\n      { title:'1 Test bestehen',   cur:0, tgt:1,  period:'Heute',       reward:10, done:false },\n      { title:'5 Tage am Stück',   cur:5, tgt:5,  period:'Diese Woche', reward:20, done:true },\n    ];\n    this.badges = [\n      { emoji:'🔥', name:'Feuerteufel',  cur:5,  tgt:5,   got:true },\n      { emoji:'🎯', name:'Scharfschütze',cur:20, tgt:20,  got:true },\n      { emoji:'⚡', name:'Blitzschnell', cur:6,  tgt:10,  got:false },\n      { emoji:'💯', name:'Perfekt',      cur:80, tgt:100, got:false },\n      { emoji:'📚', name:'Bücherwurm',   cur:64, tgt:100, got:false },\n      { emoji:'👑', name:'Meister',      cur:2,  tgt:10,  got:false },\n    ];\n    this.offers = [\n      { emoji:'🎮', title:'30 Min extra Zocken', cost:150, left:2, cap:3, sold:false },\n      { emoji:'🍕', title:'Lieblingsessen aussuchen', cost:300, left:1, cap:1, sold:false },\n      { emoji:'🎬', title:'Kinoabend', cost:500, left:0, cap:1, sold:true },\n      { emoji:'🌙', title:'1 Std länger aufbleiben', cost:200, left:3, cap:3, sold:false },\n    ];\n    this.purchases = [\n      { emoji:'🎮', title:'30 Min extra Zocken', cost:150, date:'04.07.', status:'Erfüllt' },\n      { emoji:'🍦', title:'Eis essen gehen', cost:80, date:'06.07.', status:'Gekauft' },\n    ];\n    this.history = [\n      { kind:'Basis',    reason:'Richtige Antwort', delta:'+10', cur:'🪙', pos:true },\n      { kind:'Combo',    reason:'5er-Combo!',       delta:'+5',  cur:'💎', pos:true },\n      { kind:'Test',     reason:'Test bestanden',   delta:'+40', cur:'🪙', pos:true },\n      { kind:'Shop',     reason:'Bildschirmzeit gekauft', delta:'-20', cur:'🪙', pos:false },\n      { kind:'Mission',  reason:'5 Tage Streak',    delta:'+20', cur:'💎', pos:true },\n      { kind:'Skin',     reason:'Flink gekauft',    delta:'-30', cur:'💎', pos:false },\n    ];\n    this.catalog = [\n      { id:'c1', emoji:'⏱️', title:'Bildschirmzeit', desc:'Extra Minuten am Tablet', unit:'Min', coin:20, gem:0, per:15, stock:8 },\n      { id:'c2', emoji:'🍬', title:'Süßigkeiten-Gutschein', desc:'Einlösbar am Kiosk', unit:'Stück', coin:60, gem:0, per:1, stock:5 },\n      { id:'c3', emoji:'👫', title:'Freund einladen', desc:'Kumpel zum Übernachten', unit:'Stück', coin:100, gem:30, per:1, stock:3 },\n      { id:'c4', emoji:'🍿', title:'Film-Abend Snackbox', desc:'Popcorn & Chips', unit:'Stück', coin:250, gem:0, per:1, stock:0 },\n    ];\n\n    this.state = {\n      screen:'login', showHint:false,\n      soundOn:true, reduceMotion:false,\n      coins:340, gems:28, streak:5,\n      heroId:'pug',\n      loginNumber:'2048', loginPin:'', loginHero:'pug', loginError:'', loggingIn:false,\n      pIndex:0, pFlipped:false, pInput:'', pChoice:null, pChecked:false, pResult:null,\n      pCombo:0, pDone:false, tempoMode:false, pCoins:0, pCards:0,\n      tIndex:0, tInput:'', tChoice:null, tAnswers:[], tDone:false,\n      shopTab:'buy',\n      inventory:[ {id:'c1', title:'Bildschirmzeit', unit:'Min', qty:45}, {id:'c2', title:'Süßigkeiten-Gutschein', unit:'Stück', qty:2} ],\n      requests:[\n        { title:'Bildschirmzeit', qty:30, unit:'Min', date:'07.07.', status:'Offen' },\n        { title:'Süßigkeiten-Gutschein', qty:1, unit:'Stück', date:'05.07.', status:'Genehmigt' },\n        { title:'Bildschirmzeit', qty:15, unit:'Min', date:'03.07.', status:'Abgelehnt' },\n      ],\n      ownedSkins:['pug','cat'],\n      celebration:null, confetti:[], toasts:[],\n    };\n    this._toastId = 0;\n  }\n\n  hero(id){ return this.heroes.find(h=>h.id===id) || this.heroes[0]; }\n  norm(s){ return (s||'').trim().toLowerCase(); }\n\n  vib(ms){ if(this.state.soundOn && navigator.vibrate){ try{ navigator.vibrate(ms); }catch(e){} } }\n\n  toast(text, tone){\n    const id = ++this._toastId;\n    this.setState(s=>({ toasts:[...s.toasts, {id, text, tone:tone||'coin'}] }));\n    setTimeout(()=>{ this.setState(s=>({ toasts:s.toasts.filter(t=>t.id!==id) })); }, 2200);\n  }\n\n  celebrate(level, title, emoji){\n    const n = level==='big'?48 : level==='mid'?30 : 16;\n    const cols = ['#ffca3a','#ff3d8b','#22e0ff','#8b5cf6','#35e08d','#ff8a3d'];\n    const pieces = [];\n    if(!this.state.reduceMotion){\n      for(let i=0;i<n;i++){\n        pieces.push({ style:`position:absolute; top:-40px; left:${Math.round(Math.random()*100)}%; width:${8+Math.round(Math.random()*10)}px; height:${10+Math.round(Math.random()*14)}px; background:${cols[i%cols.length]}; border-radius:2px; animation:confFall ${1.1+Math.random()*1.1}s cubic-bezier(.3,.7,.4,1) ${Math.random()*0.4}s forwards; transform:rotate(${Math.round(Math.random()*360)}deg);` });\n      }\n    }\n    this.vib(level==='big'?[40,30,60]:30);\n    this._confToken = (this._confToken||0)+1;\n    const tok = this._confToken;\n    this.setState({ confetti:pieces });\n    setTimeout(()=>{ if(this._confToken===tok) this.setState({ confetti:[] }); }, 2000);\n    if(level==='big' || level==='mid'){\n      this.setState({ celebration:{title, emoji, level} });\n      if(level==='mid'){ setTimeout(()=>{ this.setState(s=> s.celebration&&s.celebration.level==='mid' ? {celebration:null} : {}); }, 1400); }\n    }\n  }\n  dismissCele(){ this.setState({ celebration:null }); }\n\n  go(screen){ this.setState({ screen }); this.vib(8); }\n  toggleSound(){ this.setState(s=>({ soundOn:!s.soundOn })); }\n\n  // ---- login\n  pinPush(d){ this.setState(s=> s.loginPin.length>=6 ? {} : ({ loginPin:s.loginPin+d, loginError:'' })); this.vib(6); }\n  pinDel(){ this.setState(s=>({ loginPin:s.loginPin.slice(0,-1) })); this.vib(6); }\n  pickLoginHero(id){ this.setState({ loginHero:id }); this.vib(8); }\n  submitLogin(){\n    if(this.state.loginPin.length<4){ this.setState({ loginError:'Gib mindestens 4 Ziffern ein' }); return; }\n    this.setState({ loggingIn:true });\n    setTimeout(()=>{\n      this.setState({ loggingIn:false, screen:'base', heroId:this.state.loginHero, loginPin:'' });\n    }, 650);\n  }\n\n  // ---- practice\n  startPractice(){ this.setState({ screen:'practice', pIndex:0, pFlipped:false, pInput:'', pChoice:null, pChecked:false, pResult:null, pCombo:0, pDone:false, pCoins:0, pCards:0, showHint:false }); }\n  flip(){ this.setState(s=>({ pFlipped:!s.pFlipped })); this.vib(8); }\n  toggleHint(){ this.setState(s=>({ showHint:!s.showHint })); }\n  toggleTempo(){ this.setState(s=>({ tempoMode:!s.tempoMode })); }\n  playAudio(word){ try{ if(!this.state.soundOn) return; const u=new SpeechSynthesisUtterance(word||this.vocab[this.state.pIndex].answer); u.lang='en-US'; u.rate=.85; speechSynthesis.cancel(); speechSynthesis.speak(u); }catch(e){} }\n  pInputChange(e){ const v=e.target.value; this.setState({ pInput:v }); }\n  pLetterChange(e){ const v=e.target.value.replace(/\\s/g,''); this.setState({ pInput:v }); }\n  pickPChoice(c){ if(this.state.pChecked) return; this.setState({ pChoice:c }); this.vib(6); }\n\n  _score(correct){\n    if(correct){\n      const combo = this.state.pCombo+1;\n      let coins = 10; let bonusGem = 0;\n      if(this.state.tempoMode) coins += 4;\n      if(combo>0 && combo%5===0){ bonusGem = 5; }\n      this.setState(s=>({\n        pResult:'right', pCombo:combo, pChecked:true,\n        coins:s.coins+coins, gems:s.gems+bonusGem,\n        pCoins:s.pCoins+coins, pCards:s.pCards+1,\n      }));\n      this.toast(`+${coins} 🪙`, 'coin');\n      if(bonusGem){ setTimeout(()=>{ this.toast(`Combo x${combo}! +${bonusGem} 💎`,'gem'); this.celebrate('mid', `${combo}er-Combo!`, '🔥'); }, 250); }\n      else { this.celebrate('small','',''); }\n    } else {\n      this.setState(s=>({ pResult:'wrong', pCombo:0, pChecked:true, pCards:s.pCards+1 }));\n      this.vib([20,40,20]);\n    }\n  }\n  checkTyped(){ if(this.state.pChecked) return; this._score(this.norm(this.state.pInput)===this.norm(this.vocab[this.state.pIndex].answer)); }\n  checkChoice(){ if(this.state.pChecked||!this.state.pChoice) return; this._score(this.norm(this.state.pChoice)===this.norm(this.vocab[this.state.pIndex].answer)); }\n  assess(known){ this._score(known); }\n\n  nextCard(){\n    const next = this.state.pIndex+1;\n    if(next>=this.vocab.length){\n      this.setState({ pDone:true });\n      this.celebrate('big','Runde fertig!','🎉');\n    } else {\n      this.setState({ pIndex:next, pFlipped:false, pInput:'', pChoice:null, pChecked:false, pResult:null, showHint:false });\n    }\n  }\n\n  // ---- test\n  startTest(){ this.setState({ screen:'test', tIndex:0, tInput:'', tChoice:null, tAnswers:[], tDone:false, showHint:false }); }\n  tInputChange(e){ this.setState({ tInput:e.target.value }); }\n  pickTChoice(c){ this.setState({ tChoice:c }); this.vib(6); }\n  testNext(){\n    const q = this.testQ[this.state.tIndex];\n    const given = q.mode==='choice' ? (this.state.tChoice||'') : this.state.tInput;\n    if(!this.norm(given)) return;\n    const answers = [...this.state.tAnswers, { given, ok:this.norm(given)===this.norm(q.answer), q:q.prompt, expected:q.answer }];\n    const next = this.state.tIndex+1;\n    if(next>=this.testQ.length){\n      const correct = answers.filter(a=>a.ok).length;\n      const pct = Math.round(correct/answers.length*100);\n      const passed = pct>=80;\n      this.setState({ tAnswers:answers, tDone:true });\n      if(passed){\n        this.missions[1].cur=1; this.missions[1].done=true;\n        this.setState(s=>({ coins:s.coins+40, streak:s.streak+1 }));\n        setTimeout(()=>this.celebrate('big','Sieg!','🏆'),150);\n      }\n    } else {\n      this.setState({ tAnswers:answers, tIndex:next, tInput:'', tChoice:null, showHint:false });\n    }\n  }\n  retryTest(){ this.startTest(); }\n\n  // ---- shop / account / skins\n  setShopTab(t){ this.setState({ shopTab:t }); this.vib(6); }\n  buyOffer(o){\n    if(o.sold || o.left<=0 || this.state.coins<o.cost) return;\n    o.left-=1; if(o.left<=0) o.sold=true;\n    this.purchases.unshift({ emoji:o.emoji, title:o.title, cost:o.cost, date:'09.07.', status:'Gekauft' });\n    this.setState(s=>({ coins:s.coins-o.cost }));\n    this.toast(`Gekauft! Papa löst es bald ein 🎉`,'coin');\n    this.celebrate('mid','Gekauft!',o.emoji);\n  }\n  buyItem(it){\n    if(it.stock<=0 || this.state.coins<it.coin || this.state.gems<it.gem) return;\n    it.stock-=1;\n    const inv = [...this.state.inventory];\n    const ex = inv.find(i=>i.id===it.id);\n    if(ex) ex.qty+=it.per; else inv.push({ id:it.id, title:it.title, unit:it.unit, qty:it.per });\n    this.setState(s=>({ coins:s.coins-it.coin, gems:s.gems-it.gem, inventory:inv }));\n    this.toast(`+${it.per} ${it.unit} im Inventar!`,'coin');\n    this.celebrate('mid','Gekauft!',it.emoji);\n  }\n  redeem(inv){\n    const amount = Math.min(inv.qty, inv.unit==='Min'?30:1);\n    const reqs=[{ title:inv.title, qty:amount, unit:inv.unit, date:'09.07.', status:'Offen' }, ...this.state.requests];\n    this.setState({ requests:reqs, shopTab:'requests' });\n    this.toast(`Anfrage gesendet · ${amount} ${inv.unit}`,'coin');\n  }\n  equipSkin(id){ this.setState({ heroId:id }); this.vib(10); this.toast('Ausgerüstet!','gem'); }\n  buySkin(h){\n    if(this.state.ownedSkins.includes(h.id) || this.state.gems<h.price) return;\n    this.setState(s=>({ gems:s.gems-h.price, ownedSkins:[...s.ownedSkins, h.id], heroId:h.id }));\n    this.celebrate('big','Neuer Held!',h.emoji);\n    this.toast(`${h.name} freigeschaltet!`,'gem');\n  }\n\n  renderVals(){\n    const s = this.state;\n    const H = this.hero(s.heroId);\n    const on = (x)=> s.screen===x;\n    const showFrame = s.screen!=='login';\n\n    // ---- login pin dots\n    const pinDots = Array.from({length:6}).map((_,i)=>({ filled: i<s.loginPin.length }));\n    const loginHeroes = this.heroes.slice(0,4).map(h=>({ ...h, active:h.id===s.loginHero }));\n    const loginHeroBig = this.hero(s.loginHero);\n    const pad = ['1','2','3','4','5','6','7','8','9'].map(d=>({ d, tap:()=>this.pinPush(d) }));\n\n    // ---- base\n    const goalDone = 0, goalTotal = 2; // ziele heute\n    const posTiles = this.positions.map(p=>({\n      ...p,\n      dueLabel: p.type==='Vokabeln' ? `${p.due} fällig` : '',\n      onPlay: p.playable ? ()=>this.startPractice() : ()=>this.toast('Diese Übung kannst du bald spielen ⏳','soon'),\n      onTest: p.playable ? ()=>this.startTest() : null,\n    }));\n    const missionRows = this.missions.map(m=>({\n      ...m, barPct: Math.min(100, Math.round(m.cur/m.tgt*100)), label:`${Math.min(m.cur,m.tgt)} / ${m.tgt}`,\n    }));\n\n    // ---- practice card\n    const card = this.vocab[s.pIndex] || {};\n    const isReveal = card.mode==='reveal', isTyped=card.mode==='typed', isChoice=card.mode==='choice', isLetters=card.mode==='letters', isHear=card.mode==='hear';\n    const letterMax = (card.answer||'').length;\n    const letterCells = Array.from({length:letterMax}).map((_,i)=>({ char:(s.pInput[i]||'').toUpperCase(), active:i===s.pInput.length }));\n    const pChoiceItems = (card.choices||[]).map(c=>{\n      let bg='rgba(255,255,255,.06)', bd='2px solid rgba(255,255,255,.12)', color='#e9ecff';\n      if(s.pChecked){\n        if(this.norm(c)===this.norm(card.answer)){ bg='rgba(53,224,141,.22)'; bd='2px solid #35e08d'; color='#8affc4'; }\n        else if(c===s.pChoice){ bg='rgba(255,77,77,.18)'; bd='2px solid #ff4d4d'; color='#ffb3b3'; }\n      } else if(c===s.pChoice){ bg:'rgba(34,224,255,.16)'; bd='2px solid #22e0ff'; }\n      return { text:c, style:`background:${c===s.pChoice&&!s.pChecked?'rgba(34,224,255,.16)':bg}; border:${c===s.pChoice&&!s.pChecked?'2px solid #22e0ff':bd}; color:${color};`, tap:()=>this.pickPChoice(c) };\n    });\n    const pProgress = `Karte ${Math.min(s.pIndex+1,this.vocab.length)} / ${this.vocab.length}`;\n    const showSolution = s.pResult==='wrong';\n    const canNext = s.pChecked;\n\n    // ---- test\n    const tq = this.testQ[s.tIndex] || {};\n    const tIsChoice = tq.mode==='choice', tIsTyped=tq.mode==='typed';\n    const tChoiceItems = (tq.choices||[]).map(c=>({ text:c, style:`background:${c===s.tChoice?'rgba(34,224,255,.16)':'rgba(255,255,255,.06)'}; border:${c===s.tChoice?'2px solid #22e0ff':'2px solid rgba(255,255,255,.12)'}; color:#e9ecff;`, tap:()=>this.pickTChoice(c) }));\n    const tProgress = `Frage ${Math.min(s.tIndex+1,this.testQ.length)} / ${this.testQ.length}`;\n    const tCorrect = s.tAnswers.filter(a=>a.ok).length;\n    const tTotal = this.testQ.length;\n    const tPct = s.tDone ? Math.round(tCorrect/tTotal*100) : 0;\n    const tPassed = tPct>=80;\n    const ringStyle = `conic-gradient(${tPassed?'#35e08d':'#ff8a3d'} ${tPct*3.6}deg, rgba(255,255,255,.1) 0deg)`;\n    const tItems = s.tAnswers.map(a=>({ ...a, okIcon: a.ok?'✅':'❌' }));\n    const tCanNext = tIsChoice ? !!s.tChoice : !!(s.tInput&&s.tInput.trim());\n    const tNotPassed = s.tDone && !tPassed;\n    const tNotDone = !s.tDone;\n    const tIsLast = s.tIndex===this.testQ.length-1;\n    const tNextBg = tCanNext ? 'linear-gradient(180deg,#22e0ff,#1298d6)' : 'rgba(255,255,255,.08)';\n    const tNextColor = tCanNext ? '#04263a' : '#5a6088';\n\n    // ---- path heatmap\n    const heat = [ 'full','full','part','full','full','part','today' ].map((k,i)=>({\n      style:`background:${k==='full'?'#35e08d':k==='part'?'rgba(53,224,141,.35)':k==='today'?'rgba(34,224,255,.25)':'rgba(255,255,255,.08)'}; ${k==='today'?'border:2px solid #22e0ff;':''}`,\n      label:['Mo','Di','Mi','Do','Fr','Sa','So'][i],\n    }));\n    const badgeItems = this.badges.map(b=>({ ...b, pctLabel:`${b.cur}/${b.tgt}`, dim: b.got?'1':'0.4' }));\n\n    // ---- account\n    const offerRows = this.offers.map(o=>({\n      ...o,\n      afford: !o.sold && o.left>0 && s.coins>=o.cost,\n      btnLabel: o.sold ? 'ausverkauft' : (s.coins<o.cost ? `noch ${o.cost-s.coins} 🪙` : 'Kaufen'),\n      capLabel: `noch ${o.left} / ${o.cap}`,\n      tap:()=>this.buyOffer(o),\n    }));\n\n    // ---- shop\n    const catRows = this.catalog.map(it=>({\n      ...it,\n      priceLabel: it.gem>0 ? `${it.coin} 🪙 + ${it.gem} 💎` : `${it.coin} 🪙`,\n      afford: it.stock>0 && s.coins>=it.coin && s.gems>=it.gem,\n      btnLabel: it.stock<=0 ? 'ausverkauft' : (s.coins<it.coin ? `noch ${it.coin-s.coins} 🪙` : (s.gems<it.gem ? `noch ${it.gem-s.gems} 💎` : 'Kaufen')),\n      stockLabel: it.stock<=0 ? 'ausverkauft' : `Bestand ${it.stock}`,\n      tap:()=>this.buyItem(it),\n    }));\n    const invRows = s.inventory.filter(i=>i.qty>0).map(i=>({ ...i, tap:()=>this.redeem(i) }));\n    const reqRows = s.requests.map(r=>({ ...r, tone: r.status==='Genehmigt'?'#35e08d':r.status==='Abgelehnt'?'#ff6b6b':'#ffca3a' }));\n\n    // ---- skins\n    const skinItems = this.heroes.map(h=>{\n      const owned = s.ownedSkins.includes(h.id);\n      const equipped = h.id===s.heroId;\n      return { ...h, owned, equipped,\n        statusLabel: equipped?'Ausgerüstet' : owned?'Wählen' : `💎 ${h.price}`,\n        statusStyle: equipped?'background:#35e08d; color:#05231a;' : owned?'background:rgba(34,224,255,.18); color:#22e0ff; border:2px solid #22e0ff;' : (s.gems>=h.price?'background:rgba(139,92,246,.22); color:#c4b5fd; border:2px solid #8b5cf6;':'background:rgba(255,255,255,.06); color:#7a80a8;'),\n        tap: equipped?()=>{} : owned?()=>this.equipSkin(h.id):()=>this.buySkin(h),\n      };\n    });\n\n    const cele = s.celebration;\n    const celeBig = cele && cele.level==='big';\n\n    return {\n      H, heroEmoji:H.emoji, coins:s.coins, gems:s.gems, streak:s.streak, soundOn:s.soundOn,\n      soundIcon: s.soundOn?'🔊':'🔇',\n      showFrame, showHud: showFrame, showNav: showFrame && s.screen!=='practice' && s.screen!=='test',\n      scLogin:on('login'), scBase:on('base'), scPractice:on('practice'), scTest:on('test'),\n      scPath:on('path'), scAccount:on('account'), scShop:on('shop'), scSkins:on('skins'),\n      navBase:on('base'), navPath:on('path'), navAccount:on('account'), navShop:on('shop'), navSkins:on('skins'),\n      goBase:()=>this.go('base'), goPath:()=>this.go('path'), goAccount:()=>this.go('account'), goShop:()=>this.go('shop'), goSkins:()=>this.go('skins'),\n      toggleSound:()=>this.toggleSound(),\n      // login\n      pinDots, loginNumber:s.loginNumber, loginHeroes, loginHeroEmoji:loginHeroBig.emoji, loginHeroName:loginHeroBig.name, loginError:s.loginError, loggingIn:s.loggingIn, hasLoginError: !!s.loginError,\n      pad, pinPush:(d)=>this.pinPush(d), pinDel:()=>this.pinDel(), pinZero:()=>this.pinPush('0'), submitLogin:()=>this.submitLogin(),\n      pickLoginHero:(id)=>this.pickLoginHero(id),\n      // base\n      planTitle: this.positions[0].title, goalLabel:`${goalDone} / ${goalTotal}`, posTiles, missionRows,\n      startPractice:()=>this.startPractice(), startTest:()=>this.startTest(),\n      // practice\n      card, cardStage:card.stage, cardPrompt:card.prompt, cardHint:card.hint, cardAnswer:card.answer,\n      isReveal, isTyped, isChoice, isLetters, isHear,\n      pFlipped:s.pFlipped, pInput:s.pInput, pChecked:s.pChecked, pResult:s.pResult, pResultRight:s.pResult==='right', pResultWrong:s.pResult==='wrong',\n      pChoiceItems, letterCells, letterMax, pProgress, pCombo:s.pCombo, showCombo:s.pCombo>=2, showHint:s.showHint, hasHint:!!card.hint,\n      showSolution, canNext, tempoMode:s.tempoMode, pDone:s.pDone, pNotDone:!s.pDone, pCoins:s.pCoins, pCards:s.pCards,\n      notHear: !isHear, isHearMode:isHear,\n      showFlipBtn: isReveal && !s.pFlipped,\n      showAssess: isReveal && s.pFlipped && !s.pChecked,\n      showTypedInput: (isTyped||isHear) && !s.pChecked,\n      showLetterInput: isLetters && !s.pChecked,\n      showChoiceArea: isChoice && !s.pChecked,\n      feedbackRight: s.pChecked && s.pResult==='right',\n      feedbackWrong: s.pChecked && s.pResult==='wrong',\n      playAudio:()=>this.playAudio(),\n      flip:()=>this.flip(), toggleHint:()=>this.toggleHint(), toggleTempo:()=>this.toggleTempo(),\n      pInputChange:(e)=>this.pInputChange(e), pLetterChange:(e)=>this.pLetterChange(e),\n      checkTyped:()=>this.checkTyped(), checkChoice:()=>this.checkChoice(), assessKnown:()=>this.assess(true), assessUnknown:()=>this.assess(false),\n      nextCard:()=>this.nextCard(),\n      // test\n      tq, tqStage:tq.stage, tqPrompt:tq.prompt, tIsChoice, tIsTyped, tChoiceItems, tProgress, tInput:s.tInput,\n      tDone:s.tDone, tNotDone, tPct, tPassed, tNotPassed, ringStyle, tItems, tCorrect, tTotal, tCanNext, tNextBg, tNextColor, tIsLast,\n      tqStage:tq.stage, tqPrompt:tq.prompt, tqNotHear:true, tProgressPct: Math.round(s.tIndex/this.testQ.length*100),\n      resultTitle: tPassed?'Sieg!':'Fast!', resultEmoji: tPassed?'🏆':'💪',\n      tInputChange:(e)=>this.tInputChange(e), testNext:()=>this.testNext(), retryTest:()=>this.retryTest(),\n      // path\n      heat, badgeItems, totalPoints:1240,\n      // account\n      history:this.history.map(h=>({ ...h, deltaColor: h.pos?'#8affc4':'#ff9a9a' })),\n      // shop\n      shopTab:s.shopTab, shopBuy:s.shopTab==='buy', shopInv:s.shopTab==='inv', shopReq:s.shopTab==='requests',\n      setBuy:()=>this.setShopTab('buy'), setInv:()=>this.setShopTab('inv'), setReq:()=>this.setShopTab('requests'),\n      catRows, invRows, reqRows, invEmpty: invRows.length===0,\n      // skins\n      skinItems, skinBigEmoji:H.emoji, skinBigName:H.name,\n      // celebration + toasts\n      celebration:cele, hasCele:!!cele, celeTitle:cele&&cele.title, celeEmoji:cele&&cele.emoji, celeBig,\n      confetti:s.confetti, dismissCele:()=>this.dismissCele(), toasts:s.toasts,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
